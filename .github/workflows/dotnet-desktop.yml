name: .NET Desktop Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore Quiver.sln

    - name: Test with coverage
      run: dotnet test Quiver.sln -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory "${{ runner.temp }}/coverage"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-cobertura
        path: ${{ runner.temp }}/coverage/**/coverage.cobertura.xml
        retention-days: 14

  build-windows:
    runs-on: windows-latest
    
    env:
      Solution_Name: Quiver.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore Quiver.sln

    - name: Publish Windows x64
      run: dotnet publish Quiver.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/win-x64

    - name: Upload Windows x64
      uses: actions/upload-artifact@v4
      with:
        name: Quiver-Windows-x64
        path: publish/win-x64
        retention-days: 14

    - name: Package Windows release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        Copy-Item version.txt -Destination publish/win-x64/
        Compress-Archive -Path publish/win-x64/* -DestinationPath Quiver-Windows-x64.zip

    - name: Upload Windows release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-Quiver-Windows-x64
        path: Quiver-Windows-x64.zip
        retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    
    env:
      Solution_Name: Quiver.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore Quiver.sln

    - name: Publish Linux x64
      run: dotnet publish Quiver.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/linux-x64

    - name: Publish Linux ARM64
      run: dotnet publish Quiver.csproj -c Release -r linux-arm64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/linux-arm64

    - name: Upload Linux x64
      uses: actions/upload-artifact@v4
      with:
        name: Quiver-Linux-x64
        path: publish/linux-x64
        retention-days: 14

    - name: Upload Linux ARM64
      uses: actions/upload-artifact@v4
      with:
        name: Quiver-Linux-ARM64
        path: publish/linux-arm64
        retention-days: 14

    - name: Package Linux release archives
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      run: |
        cp version.txt publish/linux-x64/
        cp version.txt publish/linux-arm64/
        tar -czf Quiver-Linux-X64.tar.gz -C publish/linux-x64 .
        tar -czf Quiver-Linux-ARM64.tar.gz -C publish/linux-arm64 .

    - name: Upload Linux x64 release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-Quiver-Linux-X64
        path: Quiver-Linux-X64.tar.gz
        retention-days: 1

    - name: Upload Linux ARM64 release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-Quiver-Linux-ARM64
        path: Quiver-Linux-ARM64.tar.gz
        retention-days: 1

  build-macos:
    runs-on: macos-latest
    
    env:
      Solution_Name: Quiver.sln
      App_Name: Quiver

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore Quiver.sln

    - name: Publish macOS x64
      run: dotnet publish Quiver.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o publish/osx-x64

    - name: Create macOS .app bundle
      run: |
        APP_BUNDLE="publish/${{ env.App_Name }}.app"
        mkdir -p "$APP_BUNDLE/Contents/MacOS"
        mkdir -p "$APP_BUNDLE/Contents/Resources"
        
        # Copy all published files to the app bundle
        cp -r publish/osx-x64/* "$APP_BUNDLE/Contents/MacOS/"
        cp version.txt "$APP_BUNDLE/Contents/MacOS/"
        
        # Make the executable... executable
        chmod +x "$APP_BUNDLE/Contents/MacOS/${{ env.App_Name }}"
        
        # Create Info.plist
        cat > "$APP_BUNDLE/Contents/Info.plist" << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>${{ env.App_Name }}</string>
            <key>CFBundleIdentifier</key>
            <string>com.tgeorgiadis.quiver</string>
            <key>CFBundleName</key>
            <string>${{ env.App_Name }}</string>
            <key>CFBundleVersion</key>
            <string>2.3.1</string>
            <key>CFBundleShortVersionString</key>
            <string>2.3.1</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF

    - name: Upload macOS x64
      uses: actions/upload-artifact@v4
      with:
        name: Quiver-macOS-x64
        path: publish/${{ env.App_Name }}.app
        retention-days: 14

    - name: Package macOS release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      run: |
        cd publish
        zip -r ../Quiver-macOS-x64.zip "${{ env.App_Name }}.app"

    - name: Upload macOS release archive
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-Quiver-macOS-x64
        path: Quiver-macOS-x64.zip
        retention-days: 1

  publish-release:
    needs: [ test, build-windows, build-linux, build-macos ]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - name: Download release archives
      uses: actions/download-artifact@v4
      with:
        pattern: release-Quiver-*
        merge-multiple: true
        path: release-assets

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets/*
